<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0E1A">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>WC26 — One Portal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700;800&family=Barlow:wght@400;500;600;700&display=swap');
:root{
  --ink:#0A0E1A;--surface:#141A2B;--surface-2:#1B2236;--line:#262F47;
  --crimson:#FF1F5A;--crimson-soft:rgba(255,31,90,.14);--gold:#FFD23F;
  --live:#00E07A;--amber:#FFA63D;--text:#F5F7FF;--muted:#8A93AB;--muted-2:#5C6584;
  --display:'Barlow Semi Condensed',system-ui,sans-serif;
  --body:'Barlow',system-ui,-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--body);background:#05070F;color:var(--text);display:flex;justify-content:center;min-height:100vh}
.phone{width:100%;max-width:430px;min-height:100vh;background:var(--ink);position:relative;display:flex;flex-direction:column;overflow:hidden}
@media(min-width:480px){
  body{align-items:center;padding:24px 0;background:radial-gradient(circle at 50% -10%,#161E36 0%,#05070F 55%)}
  .phone{min-height:880px;height:880px;border-radius:42px;border:10px solid #0D1322;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 1px #1d2740}
}
.appbar{flex:0 0 auto;padding:16px 18px 12px;background:linear-gradient(180deg,#10172A,var(--ink));border-bottom:1px solid var(--line)}
.appbar-top{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:baseline;gap:8px}
.brand .mark{font-family:var(--display);font-weight:800;font-size:26px;letter-spacing:-.5px;line-height:1}
.brand .mark span{color:var(--crimson)}
.brand .sub{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1.2px}
.updated{font-size:11px;color:var(--muted);font-weight:600;text-align:right}
.updated b{color:var(--live)}
.sample-badge{margin-top:9px;display:none;align-items:center;gap:6px;font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--amber);background:rgba(255,166,61,.1);border:1px solid rgba(255,166,61,.3);padding:4px 9px;border-radius:6px}
.sample-badge.show{display:inline-flex}
.screen{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 14px 90px}
.screen::-webkit-scrollbar{width:0}
.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.section-head{display:flex;align-items:center;justify-content:space-between;margin:18px 4px 10px}
.section-head:first-child{margin-top:4px}
.section-head h2{font-family:var(--display);font-size:17px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.section-head .hint{font-size:11px;color:var(--muted);font-weight:600}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:10px}
.match.live{border-color:rgba(0,224,122,.35);background:linear-gradient(180deg,rgba(0,224,122,.05),var(--surface));cursor:pointer}
.match-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:11px;color:var(--muted);font-weight:600}
.live-pill{display:inline-flex;align-items:center;gap:6px;color:var(--live);font-weight:700;letter-spacing:.5px}
.live-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,224,122,.6)}70%{box-shadow:0 0 0 7px rgba(0,224,122,0)}100%{box-shadow:0 0 0 0 rgba(0,224,122,0)}}
.team-row{display:flex;align-items:center;justify-content:space-between;margin:6px 0}
.team{display:flex;align-items:center;gap:11px;min-width:0}
.crest{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:11px;color:#fff;flex:0 0 auto;overflow:hidden}
.crest img{width:100%;height:100%;object-fit:cover}
.team-name{font-family:var(--display);font-weight:600;font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score{font-family:var(--display);font-weight:800;font-size:22px;min-width:22px;text-align:right}
.score.dim{color:var(--muted-2)}
.kickoff{font-family:var(--display);font-weight:700;font-size:15px;color:var(--muted)}
.empty{text-align:center;color:var(--muted);padding:34px 16px;font-size:14px;line-height:1.5}
.empty .big{font-family:var(--display);font-size:18px;color:var(--text);margin-bottom:6px}
.seg{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:4px;margin:4px 4px 14px}
.seg button{flex:1;background:none;border:none;color:var(--muted);font-family:var(--display);font-weight:700;font-size:12px;padding:9px 4px;border-radius:9px;cursor:pointer;text-transform:uppercase;letter-spacing:.2px;white-space:nowrap;transition:background .15s,color .15s}
.seg button.on{background:var(--crimson);color:#fff}
.award-panel{display:none}
.award-panel.on{display:block}
.race-leader{background:linear-gradient(135deg,rgba(255,210,63,.16),var(--surface));border-color:rgba(255,210,63,.4);display:flex;align-items:center;gap:14px}
.race-leader.glove{background:linear-gradient(135deg,rgba(0,224,122,.16),var(--surface));border-color:rgba(0,224,122,.4)}
.boot{font-size:30px}
.race-leader .info{flex:1;min-width:0}
.race-leader .label{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold);font-weight:700}
.race-leader.glove .label{color:var(--live)}
.race-leader .name{font-family:var(--display);font-weight:700;font-size:20px;margin:1px 0}
.race-leader .t{font-size:12px;color:var(--muted)}
.race-leader .tally{font-family:var(--display);font-weight:800;font-size:34px;color:var(--gold)}
.race-leader.glove .tally{color:var(--live)}
.list-card{padding:4px 2px}
.stat-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line)}
.stat-row:last-child{border-bottom:none}
.rank{font-family:var(--display);font-weight:700;font-size:14px;color:var(--muted-2);width:18px;text-align:center}
.stat-info{flex:1;min-width:0}
.stat-info .n{font-family:var(--display);font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat-info .t{font-size:11px;color:var(--muted)}
.bar-wrap{flex:0 0 70px;display:flex;align-items:center}
.bar{flex:1;height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:3px}
.bar.goals i{background:var(--gold)}
.bar.assists i{background:var(--crimson)}
.bar.glove i{background:var(--live)}
.stat-val{font-family:var(--display);font-weight:800;font-size:17px;width:16px;text-align:right}
.grp{margin-bottom:14px}
.grp h3{font-family:var(--display);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:0 4px 7px}
.tbl{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.tbl th,.tbl td{padding:9px 6px;font-size:13px;text-align:center}
.tbl th{font-family:var(--display);font-weight:600;color:var(--muted-2);font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--line)}
.tbl td.tname{text-align:left;font-family:var(--display);font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.tbl td.tname .crest{width:22px;height:22px;font-size:9px}
.tbl tr td:last-child{font-family:var(--display);font-weight:800;color:var(--text)}
.tbl tr.q{border-left:3px solid var(--live)}
.tbl tr.race{border-left:3px solid var(--amber)}
.legend{display:flex;gap:16px;margin:2px 4px 14px;font-size:11px;color:var(--muted)}
.legend span{display:flex;align-items:center;gap:6px}
.legend i{width:9px;height:9px;border-radius:2px;display:inline-block}
.note{font-size:11px;color:var(--muted-2);margin:4px 4px 8px;line-height:1.5}
.live-hero{background:linear-gradient(180deg,#13243A,var(--surface));border:1px solid rgba(0,224,122,.3);border-radius:18px;padding:18px 16px;margin-bottom:14px}
.live-hero .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:11px;color:var(--muted);font-weight:600}
.lh-teams{display:flex;align-items:center;justify-content:center;gap:14px}
.lh-side{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1;min-width:0}
.lh-side .crest{width:46px;height:46px;font-size:15px}
.lh-side .nm{font-family:var(--display);font-weight:700;font-size:14px;text-align:center}
.lh-score{font-family:var(--display);font-weight:800;font-size:40px;display:flex;gap:9px;align-items:center}
.lh-min{text-align:center;margin-top:10px;font-family:var(--display);font-weight:700;color:var(--live);font-size:13px;letter-spacing:1px}
.cmt{display:flex;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line);animation:fade .3s ease}
.cmt-min{font-family:var(--display);font-weight:700;font-size:13px;color:var(--muted-2);flex:0 0 38px}
.cmt-body{flex:1;font-size:14px;line-height:1.45}
.cmt-icon{margin-right:5px}
.cmt.goal{background:var(--crimson-soft);border-radius:10px;padding:12px;border-bottom:none;margin-bottom:2px}
.cmt.goal .cmt-min{color:var(--crimson)}
.tabbar{position:absolute;bottom:0;left:0;right:0;display:flex;background:rgba(13,18,34,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:8px 4px calc(8px + env(safe-area-inset-bottom))}
.tab{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted-2);padding:4px;transition:color .2s}
.tab .ic{font-size:18px;line-height:1}
.tab .lb{font-size:10px;font-weight:600}
.tab.active{color:var(--crimson)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="phone">
  <header class="appbar">
    <div class="appbar-top">
      <div class="brand"><div class="mark">WC<span>26</span></div><div class="sub">One Portal</div></div>
      <div class="updated" id="updated"></div>
    </div>
    <span class="sample-badge" id="sampleBadge">Showing sample data · connect API to go live</span>
  </header>
  <main class="screen">
    <section class="view active" id="view-matches"></section>
    <section class="view" id="view-table"></section>
    <section class="view" id="view-awards"></section>
    <section class="view" id="view-live"></section>
  </main>
  <nav class="tabbar">
    <button class="tab active" data-view="matches"><span class="ic">⚽</span><span class="lb">Matches</span></button>
    <button class="tab" data-view="table"><span class="ic">📊</span><span class="lb">Table</span></button>
    <button class="tab" data-view="awards"><span class="ic">🏆</span><span class="lb">Awards</span></button>
    <button class="tab" data-view="live"><span class="ic">📡</span><span class="lb">Live</span></button>
  </nav>
</div>
<script>
let DATA = null;
let currentAward = "boot";

const FALLBACK = {
  meta:{league:"FIFA World Cup 2026",sample:true,lastUpdated:"2026-06-13T12:00:00.000Z"},
  matches:{
    live:[{id:1,status:"IN_PLAY",minute:67,round:"Group F",venue:"MetLife Stadium",home:{name:"Brazil",logo:""},away:{name:"Morocco",logo:""},goals:{home:2,away:1},events:[]}],
    upcoming:[
      {id:2,date:"2026-06-13T15:00:00Z",status:"NS",round:"Group D",home:{name:"Haiti",logo:""},away:{name:"Scotland",logo:""},goals:{home:null,away:null},events:[]},
      {id:3,date:"2026-06-13T18:00:00Z",status:"NS",round:"Group A",home:{name:"Qatar",logo:""},away:{name:"Switzerland",logo:""},goals:{home:null,away:null},events:[]}],
    finished:[
      {id:5,date:"2026-06-12T20:00:00Z",status:"FINISHED",round:"Group C",home:{name:"USA",logo:""},away:{name:"Paraguay",logo:""},goals:{home:4,away:1},events:[]},
      {id:7,date:"2026-06-11T19:00:00Z",status:"FINISHED",round:"Group A",home:{name:"Mexico",logo:""},away:{name:"South Africa",logo:""},goals:{home:2,away:0},events:[]}]
  },
  standings:[
    {group:"Group A",teams:[
      {rank:1,name:"Mexico",logo:"",played:1,points:3,gd:2,gf:2,ga:0},
      {rank:2,name:"Switzerland",logo:"",played:0,points:0,gd:0,gf:0,ga:0},
      {rank:3,name:"Qatar",logo:"",played:0,points:0,gd:0,gf:0,ga:0},
      {rank:4,name:"South Africa",logo:"",played:1,points:0,gd:-2,gf:0,ga:2}]}
  ],
  scorers:[
    {name:"F. Balogun",photo:"",team:"USA",goals:3},
    {name:"Rodrygo",photo:"",team:"Brazil",goals:2},
    {name:"L. Messi",photo:"",team:"Argentina",goals:1}],
  assists:[
    {name:"C. Pulisic",photo:"",team:"USA",assists:3},
    {name:"Neymar",photo:"",team:"Brazil",assists:2}],
  goldenGlove:[
    {team:"Mexico",logo:"",cleanSheets:1,played:1},
    {team:"USA",logo:"",cleanSheets:0,played:1}]
};

function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function hue(name){let h=0;for(const c of String(name))h=(h*31+c.charCodeAt(0))%360;return h;}
function crest(t){
  if(t.logo) return `<span class="crest"><img src="${esc(t.logo)}" alt="" loading="lazy"></span>`;
  const code=(t.name||"?").replace(/[^A-Za-z]/g,"").slice(0,3).toUpperCase()||"?";
  return `<span class="crest" style="background:hsl(${hue(t.name)} 55% 38%)">${esc(code)}</span>`;
}
function kickoff(iso){if(!iso) return "";return new Date(iso).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});}

function render(){
  const sample = DATA.meta && DATA.meta.sample;
  document.getElementById('sampleBadge').classList.toggle('show', !!sample);
  const lu = DATA.meta && DATA.meta.lastUpdated ? new Date(DATA.meta.lastUpdated) : null;
  document.getElementById('updated').innerHTML = lu ? `Updated <b>${lu.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</b>` : '';
  renderMatches();
  renderTable();
  renderAwards();
  renderLive();
}

function matchCard(m, live){
  const meta = live
    ? `<span>${esc(m.round||'')}</span><span class="live-pill"><span class="dot"></span>LIVE ${m.minute?m.minute+"'":''}</span>`
    : (m.status==='NS'
        ? `<span>${esc(m.round||'')}</span><span>${kickoff(m.date)||'Upcoming'}</span>`
        : `<span>${esc(m.round||'')}</span><span>Full time</span>`);
  const homeRight = m.status==='NS'
    ? `<span class="kickoff">${kickoff(m.date)}</span>`
    : `<span class="score ${m.goals.home<m.goals.away?'dim':''}">${m.goals.home==null?'':m.goals.home}</span>`;
  const awayRight = m.status==='NS' ? '' : `<span class="score ${m.goals.away<m.goals.home?'dim':''}">${m.goals.away==null?'':m.goals.away}</span>`;
  return `<div class="card match ${live?'live':''}" ${live?'onclick="go(\'live\')"':''}>
    <div class="match-meta">${meta}</div>
    <div class="team-row"><div class="team">${crest(m.home)}<span class="team-name">${esc(m.home.name)}</span></div>${homeRight}</div>
    <div class="team-row"><div class="team">${crest(m.away)}<span class="team-name">${esc(m.away.name)}</span></div>${awayRight}</div>
  </div>`;
}

function renderMatches(){
  const M=DATA.matches; let h='';
  if(M.live.length){h+=`<div class="section-head"><h2>Live now</h2><span class="hint">Tap for commentary</span></div>`+M.live.map(m=>matchCard(m,true)).join('');}
  if(M.upcoming.length){h+=`<div class="section-head"><h2>Upcoming</h2></div>`+M.upcoming.slice(0,10).map(m=>matchCard(m,false)).join('');}
  if(M.finished.length){h+=`<div class="section-head"><h2>Latest results</h2></div>`+M.finished.slice(0,12).map(m=>matchCard(m,false)).join('');}
  if(!h)h=`<div class="empty"><div class="big">No matches yet</div>Once the live feed is connected, fixtures appear here.</div>`;
  document.getElementById('view-matches').innerHTML=h;
}

function renderTable(){
  let h=`<div class="section-head"><h2>Group tables</h2></div>`;
  if(!DATA.standings.length){
    h+=`<div class="empty"><div class="big">Tables load soon</div>Standings appear once the feed is connected.</div>`;
    document.getElementById('view-table').innerHTML=h; return;
  }
  h+=`<div class="legend"><span><i style="background:var(--live)"></i>Advancing (top 2)</span><span><i style="background:var(--amber)"></i>3rd-place race</span></div>`;
  for(const g of DATA.standings){
    h+=`<div class="grp"><h3>${esc(g.group)}</h3><table class="tbl">
      <tr><th></th><th style="text-align:left">Team</th><th>P</th><th>GD</th><th>Pts</th></tr>`;
    g.teams.forEach((t,i)=>{
      const cls = i<2?'q':(i===2?'race':'');
      h+=`<tr class="${cls}"><td>${t.rank}</td><td class="tname">${crest(t)}${esc(t.name)}</td><td>${t.played}</td><td>${t.gd>0?'+':''}${t.gd}</td><td>${t.points}</td></tr>`;
    });
    h+=`</table></div>`;
  }
  h+=`<p class="note">Top two in each group advance. The eight best third-placed teams also reach the round of 32 — a fuller "who's going through" calculator is the next feature to build.</p>`;
  document.getElementById('view-table').innerHTML=h;
}

function bootPanel(){
  const s=DATA.scorers||[];
  if(!s.length) return `<div class="empty"><div class="big">No goals yet</div>Top scorers appear here.</div>`;
  const top=s[0],max=s[0].goals||1;
  let h=`<div class="card race-leader"><div class="boot">👟</div><div class="info"><div class="label">Leading the race</div><div class="name">${esc(top.name)}</div><div class="t">${esc(top.team)}</div></div><div class="tally">${top.goals}</div></div>`;
  h+=`<div class="card list-card">`+s.map((p,i)=>`<div class="stat-row"><span class="rank">${i+1}</span>${crest({name:p.team,logo:p.photo})}<div class="stat-info"><div class="n">${esc(p.name)}</div><div class="t">${esc(p.team)}</div></div><div class="bar-wrap"><div class="bar goals"><i style="width:${p.goals/max*100}%"></i></div></div><span class="stat-val">${p.goals}</span></div>`).join('')+`</div>`;
  return h;
}

function glovePanel(){
  const g=DATA.goldenGlove||[];
  if(!g.length) return `<div class="empty"><div class="big">No clean sheets yet</div>Appears once matches have been played.</div>`;
  const top=g[0],max=g[0].cleanSheets||1;
  let h=`<div class="card race-leader glove"><div class="boot">🧤</div><div class="info"><div class="label">Most clean sheets</div><div class="name">${esc(top.team)}</div><div class="t">${top.played} played</div></div><div class="tally">${top.cleanSheets}</div></div>`;
  h+=`<div class="card list-card">`+g.map((t,i)=>`<div class="stat-row"><span class="rank">${i+1}</span>${crest({name:t.team,logo:t.logo})}<div class="stat-info"><div class="n">${esc(t.team)}</div><div class="t">${t.played} played</div></div><div class="bar-wrap"><div class="bar glove"><i style="width:${(t.cleanSheets/max)*100}%"></i></div></div><span class="stat-val">${t.cleanSheets}</span></div>`).join('')+`</div>`;
  h+=`<p class="note">Clean sheets counted by team from match results. The full Golden Glove (per goalkeeper, with saves) needs a richer data plan — easy to add later.</p>`;
  return h;
}

function assistsPanel(){
  const s=DATA.assists||[];
  if(!s.length) return `<div class="empty"><div class="big">No assists data</div>Assists aren't in the free data tier yet — they unlock with a richer plan.</div>`;
  const max=s[0].assists||1;
  return `<div class="card list-card">`+s.map((p,i)=>`<div class="stat-row"><span class="rank">${i+1}</span>${crest({name:p.team,logo:p.photo})}<div class="stat-info"><div class="n">${esc(p.name)}</div><div class="t">${esc(p.team)}</div></div><div class="bar-wrap"><div class="bar assists"><i style="width:${p.assists/max*100}%"></i></div></div><span class="stat-val">${p.assists}</span></div>`).join('')+`</div>`;
}

function renderAwards(){
  const on=(n)=>currentAward===n?'on':'';
  const h=`
    <div class="seg">
      <button id="seg-boot" class="${on('boot')}" onclick="awardShow('boot')">Golden Boot</button>
      <button id="seg-glove" class="${on('glove')}" onclick="awardShow('glove')">Golden Glove</button>
      <button id="seg-assists" class="${on('assists')}" onclick="awardShow('assists')">Assists</button>
    </div>
    <div id="panel-boot" class="award-panel ${on('boot')}">${bootPanel()}</div>
    <div id="panel-glove" class="award-panel ${on('glove')}">${glovePanel()}</div>
    <div id="panel-assists" class="award-panel ${on('assists')}">${assistsPanel()}</div>`;
  document.getElementById('view-awards').innerHTML=h;
}

function awardShow(name){
  currentAward=name;
  ['boot','glove','assists'].forEach(n=>{
    const seg=document.getElementById('seg-'+n), panel=document.getElementById('panel-'+n);
    if(seg) seg.classList.toggle('on', n===name);
    if(panel) panel.classList.toggle('on', n===name);
  });
}

function renderLive(){
  const m=DATA.matches.live[0];
  if(!m){
    const next=DATA.matches.upcoming[0];
    document.getElementById('view-live').innerHTML=`<div class="empty"><div class="big">No live matches right now</div>${next?`Next kickoff: ${esc(next.home.name)} v ${esc(next.away.name)} at ${kickoff(next.date)}.`:'Check back at kickoff.'}</div>`;
    return;
  }
  let h=`<div class="live-hero"><div class="top"><span>${esc(m.round||'')} · ${esc(m.venue||'')}</span><span class="live-pill"><span class="dot"></span>LIVE</span></div>
    <div class="lh-teams"><div class="lh-side">${crest(m.home)}<span class="nm">${esc(m.home.name)}</span></div>
    <div class="lh-score"><span>${m.goals.home}</span><span style="color:var(--muted-2)">:</span><span>${m.goals.away}</span></div>
    <div class="lh-side">${crest(m.away)}<span class="nm">${esc(m.away.name)}</span></div></div>
    <div class="lh-min">${m.minute?m.minute+"'":'In play'}</div></div>`;
  h+=`<div class="section-head"><h2>Live commentary</h2></div>`;
  if(m.events && m.events.length){
    h+=m.events.map(e=>`<div class="cmt ${e.goal?'goal':''}"><span class="cmt-min">${esc(e.min)}</span><div class="cmt-body"><span class="cmt-icon">${e.icon||''}</span>${esc(e.text)}</div></div>`).join('');
  } else {
    h+=`<div class="empty">Minute-by-minute commentary isn't in the free data tier — it unlocks with a richer plan.</div>`;
  }
  document.getElementById('view-live').innerHTML=h;
}

function go(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===name));
  document.querySelector('.screen').scrollTop=0;
}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>go(t.dataset.view)));

async function load(){
  try{
    const res=await fetch('data/data.json?t='+Date.now());
    if(!res.ok) throw new Error('no data');
    DATA=await res.json();
  }catch(e){ DATA=FALLBACK; }
  render();
}
load();
setInterval(load, 60000);

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
